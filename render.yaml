# render.yaml — Render Blueprint for ProjectAgilite (full-stack monorepo)
# Docs: https://render.com/docs/blueprint-spec
#
# Services defined here:
#   1. agilite-api    — Express/TypeScript API  (web service, Node)
#   2. agilite-client — React SPA built with Vite (static site)
#
# HOW TO DEPLOY
# 1. Push this file to the root of your GitHub/GitLab repo.
# 2. In the Render dashboard → New → Blueprint → select this repo.
# 3. Fill in every variable marked `sync: false` before the first deploy.
# 4. Deploy — Render resolves inter-service URLs automatically.

services:

  # ─────────────────────────────────────────────────────────────────────────
  # 1. API — Express + TypeScript
  # ─────────────────────────────────────────────────────────────────────────
  - type: web
    name: agilite-api
    runtime: node
    plan: free                # explicitly opt into the free instance (default is starter = paid)
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    # Render injects PORT=10000 automatically; the server reads process.env.PORT
    envVars:
      - key: NODE_ENV
        value: production

      # ── Core ──────────────────────────────────────────────────────────────
      - key: MONGODB_URI
        sync: false   # e.g. mongodb+srv://user:pass@cluster.mongodb.net/agilite

      - key: JWT_SECRET
        generateValue: true   # Render generates a secure random string once

      # ── CORS + email links ─────────────────────────────────────────────────
      # Both resolve to the static site's public URL (e.g. https://agilite-client.onrender.com)
      - key: CLIENT_URL
        fromService:
          type: web
          name: agilite-client
          envVarKey: RENDER_EXTERNAL_URL

      - key: APP_URL
        fromService:
          type: web
          name: agilite-client
          envVarKey: RENDER_EXTERNAL_URL

      # ── Mailgun (transactional email) ──────────────────────────────────────
      - key: MAILGUN_BASE_URL
        value: https://api.mailgun.net/v3   # change to EU endpoint if needed
      - key: MAILGUN_DOMAIN
        sync: false   # e.g. mg.yourdomain.com
      - key: MAILGUN_API_KEY
        sync: false   # Mailgun private API key
      - key: MAILGUN_FROM_EMAIL
        sync: false   # e.g. Agilite Support <no-reply@mg.yourdomain.com>

      # ── Cloudflare R2 (S3-compatible object storage) ──────────────────────
      - key: S3_ENDPOINT
        sync: false   # https://<accountId>.r2.cloudflarestorage.com/<bucket>
      - key: S3_REGION
        value: auto
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_PUBLIC_BASE_URL
        sync: false   # optional: https://pub-<hash>.r2.dev  (skips signed URLs)

      # ── Pydantic AI Gateway (LLM proxy) ───────────────────────────────────
      - key: PYDANTIC_GATEWAY_BASE_URL
        sync: false   # e.g. https://your-ai-gateway.onrender.com
      - key: PYDANTIC_GATEWAY_API_KEY
        sync: false
      - key: PYDANTIC_GATEWAY_MODEL
        value: gpt-4o-mini   # override per-deployment if needed

      # ── Logfire (optional distributed tracing) ────────────────────────────
      - key: LOGFIRE_TOKEN
        sync: false   # leave blank to disable tracing


  # ─────────────────────────────────────────────────────────────────────────
  # 2. Client — React SPA (Vite static build)
  # ─────────────────────────────────────────────────────────────────────────
  - type: web
    runtime: static
    name: agilite-client
    rootDir: client
    # API_ORIGIN is the raw API service URL injected by Render before this build runs.
    # We prepend it as VITE_API_URL (with /api) so Vite bakes only the final URL into
    # the bundle. Using a non-VITE_ prefix keeps the raw origin out of the bundle.
    buildCommand: npm install && VITE_API_URL="$API_ORIGIN/api" npm run build
    staticPublishPath: dist

    # SPA routing — serve index.html for every path that isn't a real file
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      # Long-lived cache for hashed Vite assets (JS/CSS chunks)
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

    envVars:
      # API_ORIGIN: raw API service URL, used only in the build command above.
      # NOT prefixed with VITE_ so it is never baked into the JS bundle directly.
      - key: API_ORIGIN
        fromService:
          type: web
          name: agilite-api
          envVarKey: RENDER_EXTERNAL_URL
