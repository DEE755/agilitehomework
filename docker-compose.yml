# docker-compose.yml — local production stack
#
# Usage:
#   cp server/.env.example .env   # then fill in your values
#   docker compose up --build
#
# Customer portal  → http://localhost:3000
# Agent workspace  → http://localhost:3000/admin
# API              → http://localhost:5050
#
# NOTE: VITE_API_URL is baked into the client image at build time.
# If your API is on a different host in production, rebuild the client image
# with: docker build --build-arg VITE_API_URL=https://your-api/api ./client

services:

  # ── API — Express + TypeScript ───────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5050:5050"
    environment:
      NODE_ENV: production
      PORT: 5050
      # ── Core ─────────────────────────────────────────────────────────────────
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      # ── CORS + email links (point to the client container) ───────────────────
      CLIENT_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      # ── Mailgun ──────────────────────────────────────────────────────────────
      MAILGUN_BASE_URL: ${MAILGUN_BASE_URL:-https://api.mailgun.net/v3}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY}
      MAILGUN_FROM_EMAIL: ${MAILGUN_FROM_EMAIL}
      # ── Cloudflare R2 ────────────────────────────────────────────────────────
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-auto}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      # ── Pydantic AI Gateway ──────────────────────────────────────────────────
      PYDANTIC_GATEWAY_BASE_URL: ${PYDANTIC_GATEWAY_BASE_URL}
      PYDANTIC_GATEWAY_API_KEY: ${PYDANTIC_GATEWAY_API_KEY}
      PYDANTIC_GATEWAY_MODEL: ${PYDANTIC_GATEWAY_MODEL:-gpt-4o-mini}
      # ── Logfire (optional) ───────────────────────────────────────────────────
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5050/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Client — React SPA served by nginx ──────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # The browser fetches the API from the host, not from inside Docker.
        # localhost:5050 works because the API port is mapped to the host above.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5050/api}
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
